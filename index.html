<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 24px;
    border-bottom: 0.5px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #141414;
    flex-shrink: 0;
  }

  header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
  }

  header h1 {
    font-size: 15px;
    font-weight: 500;
    color: #e8e8e8;
    letter-spacing: 0.01em;
  }

  header .status {
    margin-left: auto;
    font-size: 12px;
    color: #555;
    id: status-text;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT — PDF VIEWER 70% */
  .pdf-panel {
    width: 70%;
    border-right: 0.5px solid #2a2a2a;
    display: flex;
    flex-direction: column;
    background: #111;
  }

  .pdf-toolbar {
    padding: 10px 16px;
    border-bottom: 0.5px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 10px;
    background: #141414;
    flex-shrink: 0;
  }

  .upload-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: #1e1e1e;
    border: 0.5px solid #333;
    border-radius: 6px;
    color: #ccc;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .upload-btn:hover { background: #252525; border-color: #444; }

  .upload-btn svg { width: 15px; height: 15px; stroke: #888; }

  #file-input { display: none; }

  .pdf-filename {
    font-size: 13px;
    color: #666;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pdf-filename.loaded { color: #aaa; }

  .pdf-viewer {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .pdf-viewer::-webkit-scrollbar { width: 6px; }
  .pdf-viewer::-webkit-scrollbar-track { background: transparent; }
  .pdf-viewer::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

  .pdf-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 14px;
    color: #333;
  }

  .pdf-placeholder svg { width: 48px; height: 48px; stroke: #2a2a2a; }
  .pdf-placeholder p { font-size: 14px; }

  .pdf-page-canvas {
    max-width: 100%;
    border-radius: 4px;
    border: 0.5px solid #222;
    display: block;
  }

  .page-label {
    font-size: 11px;
    color: #333;
    margin-bottom: 4px;
    align-self: flex-start;
  }

  .uploading-indicator {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #666;
  }

  .uploading-indicator.active { display: flex; }

  .spinner {
    width: 14px; height: 14px;
    border: 1.5px solid #333;
    border-top-color: #4ade80;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* RIGHT — CHAT 30% */
  .chat-panel {
    width: 30%;
    display: flex;
    flex-direction: column;
    background: #0f0f0f;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

  .chat-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: #2a2a2a;
    text-align: center;
    padding: 24px;
  }

  .chat-empty svg { width: 32px; height: 32px; stroke: #2a2a2a; }
  .chat-empty p { font-size: 13px; line-height: 1.6; }

  .msg {
    max-width: 100%;
    font-size: 13.5px;
    line-height: 1.6;
  }

  .msg.user {
    align-self: flex-end;
    background: #1a1a1a;
    border: 0.5px solid #2a2a2a;
    border-radius: 10px 10px 2px 10px;
    padding: 8px 12px;
    color: #ddd;
    max-width: 90%;
  }

  .msg.bot {
    align-self: flex-start;
    background: transparent;
    color: #aaa;
    padding: 4px 0;
    border-left: 2px solid #222;
    padding-left: 10px;
  }

  .msg.bot h2 { font-size: 13px; font-weight: 500; color: #ccc; margin: 10px 0 4px; }
  .msg.bot h3 { font-size: 13px; font-weight: 500; color: #bbb; margin: 8px 0 3px; }
  .msg.bot ul, .msg.bot ol { padding-left: 16px; margin: 4px 0; }
  .msg.bot li { margin: 3px 0; font-size: 13.5px; color: #aaa; }
  .msg.bot strong { color: #ddd; font-weight: 500; }
  .msg.bot p { margin: 4px 0; }
  .msg.bot code { background: #1e1e1e; padding: 1px 5px; border-radius: 3px; font-size: 12px; color: #88c0d0; }


    color: #444;
    font-style: italic;
  }

  .msg.error {
    color: #f87171;
    font-size: 12px;
    padding: 6px 10px;
    background: #1f0f0f;
    border-radius: 6px;
    border: 0.5px solid #3a1515;
  }

  .chat-input-area {
    padding: 12px;
    border-top: 0.5px solid #1e1e1e;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: #0f0f0f;
  }

  #chat-input {
    flex: 1;
    background: #1a1a1a;
    border: 0.5px solid #2a2a2a;
    border-radius: 8px;
    padding: 9px 12px;
    color: #ddd;
    font-size: 13.5px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.15s;
  }

  #chat-input:focus { border-color: #333; }
  #chat-input::placeholder { color: #333; }
  #chat-input:disabled { opacity: 0.4; cursor: not-allowed; }

  #send-btn {
    width: 34px; height: 34px;
    border-radius: 7px;
    background: #1e1e1e;
    border: 0.5px solid #2a2a2a;
    color: #666;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }

  #send-btn:hover:not(:disabled) { background: #252525; color: #aaa; }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #send-btn svg { width: 15px; height: 15px; }

  .ready-badge {
    display: none;
    font-size: 11px;
    padding: 2px 8px;
    background: #0d2010;
    color: #4ade80;
    border-radius: 4px;
    border: 0.5px solid #1a3a20;
    margin-left: auto;
  }

  .ready-badge.show { display: inline-flex; }
</style>
</head>
<body>

<header>
  <div class="dot"></div>
  <h1>PDF Chat</h1>
  <span class="ready-badge" id="ready-badge">ready</span>
  <span class="status" id="status-text">upload a pdf to begin</span>
</header>

<div class="main">

  <!-- LEFT: PDF VIEWER -->
  <div class="pdf-panel">
    <div class="pdf-toolbar">
      <label class="upload-btn" for="file-input">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload PDF
      </label>
      <input type="file" id="file-input" accept=".pdf" />
      <span class="pdf-filename" id="pdf-filename">no file selected</span>
      <div class="uploading-indicator" id="uploading-indicator">
        <div class="spinner"></div>
        <span>processing...</span>
      </div>
    </div>

    <div class="pdf-viewer" id="pdf-viewer">
      <div class="pdf-placeholder" id="pdf-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <p>your pdf will appear here</p>
      </div>
    </div>
  </div>

  <!-- RIGHT: CHAT -->
  <div class="chat-panel">
    <div class="chat-messages" id="chat-messages">
      <div class="chat-empty" id="chat-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>upload a pdf first,<br>then ask anything about it</p>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea
        id="chat-input"
        placeholder="ask about the pdf..."
        rows="1"
        disabled
      ></textarea>
      <button id="send-btn" disabled title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
  const BACKEND = 'http://localhost:8000';
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const fileInput = document.getElementById('file-input');
  const pdfViewer = document.getElementById('pdf-viewer');
  const pdfPlaceholder = document.getElementById('pdf-placeholder');
  const pdfFilename = document.getElementById('pdf-filename');
  const uploadingIndicator = document.getElementById('uploading-indicator');
  const chatMessages = document.getElementById('chat-messages');
  const chatEmpty = document.getElementById('chat-empty');
  const chatInput = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const statusText = document.getElementById('status-text');
  const readyBadge = document.getElementById('ready-badge');

  let pdfReady = false;

  // === PDF UPLOAD ===
  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    pdfFilename.textContent = file.name;
    pdfFilename.classList.add('loaded');
    uploadingIndicator.classList.add('active');
    statusText.textContent = 'uploading...';
    pdfReady = false;
    chatInput.disabled = true;
    sendBtn.disabled = true;
    readyBadge.classList.remove('show');

    // render PDF locally using pdf.js
    renderPDF(file);

    // send to backend
    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch(`${BACKEND}/upload`, {
        method: 'POST',
        body: formData
      });

      if (!res.ok) throw new Error('Upload failed');
      const data = await res.json();

      pdfReady = true;
      chatInput.disabled = false;
      sendBtn.disabled = false;
      statusText.textContent = `${data.total_pages} pages · ${data.total_chunks} chunks`;
      readyBadge.classList.add('show');
      uploadingIndicator.classList.remove('active');

      addBotMsg(`PDF ready — ${data.total_pages} pages processed. Ask me anything about "${file.name}".`);

    } catch (err) {
      uploadingIndicator.classList.remove('active');
      statusText.textContent = 'upload failed';
      addErrorMsg('Could not connect to backend. Make sure the server is running on port 8000.');
    }
  });

  // === RENDER PDF LOCALLY ===
  async function renderPDF(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

    pdfPlaceholder.style.display = 'none';

    // clear old pages
    const oldPages = pdfViewer.querySelectorAll('.pdf-page-canvas, .page-label');
    oldPages.forEach(el => el.remove());

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 1.4 });

      const label = document.createElement('div');
      label.className = 'page-label';
      label.textContent = `page ${i} of ${pdf.numPages}`;
      pdfViewer.appendChild(label);

      const canvas = document.createElement('canvas');
      canvas.className = 'pdf-page-canvas';
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      pdfViewer.appendChild(canvas);

      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
    }
  }

  // === CHAT ===
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  async function sendMessage() {
    const query = chatInput.value.trim();
    if (!query || !pdfReady) return;

    chatInput.value = '';
    chatInput.style.height = 'auto';
    chatEmpty.style.display = 'none';

    addUserMsg(query);
    const thinkingEl = addBotMsg('thinking...', true);
    chatInput.disabled = true;
    sendBtn.disabled = true;

    try {
      const res = await fetch(`${BACKEND}/ask?query=${encodeURIComponent(query)}`, {
        method: 'POST'
      });

      if (!res.ok) throw new Error('Request failed');
      const data = await res.json();

      thinkingEl.classList.remove('thinking');
      thinkingEl.innerHTML = marked.parse(data.answer);

    } catch (err) {
      thinkingEl.remove();
      addErrorMsg('Something went wrong. Check if the backend is running.');
    } finally {
      chatInput.disabled = false;
      sendBtn.disabled = false;
      chatInput.focus();
    }
  }

  function addUserMsg(text) {
    const el = document.createElement('div');
    el.className = 'msg user';
    el.textContent = text;
    chatMessages.appendChild(el);
    scrollChat();
    return el;
  }

  function addBotMsg(text, thinking = false) {
    const el = document.createElement('div');
    el.className = `msg bot${thinking ? ' thinking' : ''}`;
    if (thinking) {
      el.textContent = text;
    } else {
      el.innerHTML = marked.parse(text);
    }
    chatMessages.appendChild(el);
    scrollChat();
    return el;
  }

  function addErrorMsg(text) {
    const el = document.createElement('div');
    el.className = 'msg error';
    el.textContent = text;
    chatMessages.appendChild(el);
    scrollChat();
  }

  function scrollChat() {
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  // auto-resize textarea
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = chatInput.scrollHeight + 'px';
  });
</script>
</body>
</html>
